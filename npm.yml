services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    networks:
      - npm
    ports:
      - mode: ingress
        target: 80
        published: "80"
        protocol: tcp
      - mode: ingress
        target: 443
        published: "443"
        protocol: tcp
      - mode: ingress
        target: 81
        published: "81"
        protocol: tcp
    restart: unless-stopped
    environment:
      TZ: Africa/Cairo
      DB_SQLITE_FILE: /data/database.sqlite
    volumes:
      - type: volume
        source: data
        target: /data
        volume: {}
      - type: volume
        source: letsencrypt
        target: /etc/letsencrypt
        volume: {}
networks:
  npm:
    name: npm
volumes:
  data:
  letsencrypt:
