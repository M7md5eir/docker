name:
  npm
services:
  npm:
    image:
      jc21/nginx-proxy-manager:latest
    container_name:
      npm
    networks:
      default:
        npm
    ports:
      - mode: ingress
        target: 80
        published: "80"
        protocol: tcp
      - mode: ingress
        target: 443
        published: "443"
        protocol: tcp
      - mode: ingress
        target: 81
        published: "81"
        protocol: tcp
    restart:
      unless-stopped
    environment:
      TZ:
        Africa/Cairo
      DB_SQLITE_FILE:
        /data/database.sqlite
    volumes:
      - type: volume
        source: npm-data
        target: /data
        volume: {}
      - type: volume
        source: npm-letsencrypt
        target: /etc/letsencrypt
        volume: {}
volumes:
  npm-data:
    name: dge_npm-data
  npm-letsencrypt:
    name: dge_npm-letsencrypt
