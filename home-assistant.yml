name:
  home-assistant
services:
  home-assistant:
    image:
      ghcr.io/home-assistant/home-assistant:stable
    container_name:
      home-assistant
    volumes:
      - config:/config
      - localtime:/etc/localtime:ro
      - dbus:/run/dbus:ro
    network_mode:
      bridge
    ports:
      - "8123:8123"
    restart:
      unless-stopped
    environment:
      TZ: Africa/Cairo
volumes:
  config:
  localtime:
  dbus: