name:
  postgres
services:
  postgres:
    image:
      postgres:latest
    container_name:
      postgres
    volumes:
      - data:/var/lib/postgresql
    network_mode:
      bridge
    ports:
      - "5432:5432"
    restart:
      unless-stopped
    environment:
      POSTGRES_PASSWORD:
        ${POSTGRES_PASSWORD}
volumes:
  data:
